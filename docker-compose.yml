services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    volumes:
      - agent_data:/data
    environment:
      - HOST=0.0.0.0
      - PORT=3003
      - DATABASE_PATH=/data/agent-platform.db
      - NODE_ENV=production
      - APP_SECRET_KEY=dev-secret-key-change-in-production
      - WEB_SEARCH_BACKEND=none
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3003/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "3002:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  agent_data:
