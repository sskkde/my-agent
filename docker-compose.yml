services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    env_file:
      - .env.production
    volumes:
      - agent_data:/app/data
      - ./backups:/app/backups
    environment:
      - APP_SECRET_KEY_FILE=/run/secrets/app_secret_key
      - API_AUTH_TOKEN_FILE=/run/secrets/api_auth_token
    secrets:
      - app_secret_key
      - api_auth_token
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3003/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "3002:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  agent_data:

secrets:
  app_secret_key:
    file: ./secrets/app_secret_key.txt
  api_auth_token:
    file: ./secrets/api_auth_token.txt
