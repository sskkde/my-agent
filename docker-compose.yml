services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    volumes:
      - agent_data:/data
      - ./backups:/app/backups
    environment:
      - HOST=0.0.0.0
      - PORT=3003
      - DATABASE_PATH=/data/agent-platform.db
      - NODE_ENV=production
      - APP_SECRET_KEY_FILE=/run/secrets/app_secret_key
      - ALLOWED_ORIGINS=http://119.28.154.239:3002,http://localhost:3002
      - PUBLIC_BASE_URL=http://119.28.154.239:3003
      - COOKIE_SECURE=false
      - TRUST_PROXY=1
      - BACKUP_DIR=/app/backups
      - API_AUTH_TOKEN=3d9ff35670483a09ae42643ceb42071a
      - WEB_SEARCH_BACKEND=none
      - LOG_LEVEL=info
    secrets:
      - app_secret_key
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3003/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "3002:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  agent_data:

secrets:
  app_secret_key:
    file: ./secrets/app_secret_key.txt
