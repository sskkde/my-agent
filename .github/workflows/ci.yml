name: CI

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  WEB_SEARCH_BACKEND: none

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint

  format-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run format:check

  npm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
      - run: npm audit --omit=dev --audit-level=high
      - run: npm --prefix web audit --omit=dev --audit-level=high

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run test:unit

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run test:integration

  security-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run test:security

  performance-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run test:performance

  web-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm --prefix web ci --no-audit --no-fund
      - run: npm run test:web

  web-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm --prefix web ci --no-audit --no-fund
      - run: npm run build:web

  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      DATABASE_PATH: ./data/e2e.db
      PORT: 3103
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm --prefix web ci --no-audit --no-fund
      - run: npx playwright install chromium --with-deps
      - run: npm run reset:e2e-db
      - run: npm run test:e2e

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - typecheck
      - lint
      - format-check
      - unit-tests
      - integration-tests
      - security-tests
      - performance-tests
      - web-build
      - e2e-test
    steps:
      - run: echo "P7 regression gate passed via split CI jobs. scripts/check-p7.ts remains available for local/manual verification."

  test-prod-config:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run test:prod-config

  test-tenancy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run test:tenancy

  test-postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agent_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/agent_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run test:postgres

  test-backup-restore:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run test:backup-restore

  test-load:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run test:load

  test-dlq:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run test:phase4

  api-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run test:unit -- tests/integration/api/api-contract-lock.test.ts

  test-p8:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - test
      - npm-audit
      - web-test
      - test-prod-config
      - test-tenancy
      - test-postgres
      - test-backup-restore
      - test-load
      - test-dlq
      - api-contract
    steps:
      - run: echo "P8 GA gate passed via split CI jobs. scripts/check-p8.ts remains available for release/manual verification."

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [test]
    if: ${{ vars.DOCKER_ENABLED == 'true' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
