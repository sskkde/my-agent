          type: string
        reason:
          type: string
        module:
          type: string

    ReplayPreview:
      type: object
      properties:
        runId:
          type: string
        runType:
          type: string
          enum: [planner_run, workflow_run]
        status:
          type: string
          enum: [success, partial, blocked, error]
        timeline:
          type: object
          properties:
            events:
              type: array
              items:
                $ref: "#/components/schemas/TimelineEvent"
            startTime:
              type: string
              format: date-time
            endTime:
              type: string
              format: date-time
            durationMs:
              type: integer
            rootStatus:
              type: string
        blockedActions:
          type: array
          items:
            $ref: "#/components/schemas/BlockedAction"
        stateSnapshot:
          nullable: true
        warnings:
          type: array
          items:
            type: string

    ReplayPreviewResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ReplayPreview"

    # ---- Connectors ----
    ConnectorDefinition:
      type: object
      properties:
        id:
          type: string
        connectorId:
          type: string
        name:
          type: string
        connectorType:
          type: string
          enum: [api, messaging, storage, database, custom]
        version:
          type: string
        description:
          type: string
        capabilities:
          type: array
          items:
            type: string
        configSchema:
          type: object
        status:
          type: string
          enum: [draft, active, deprecated, inactive]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ConnectorInstance:
      type: object
      properties:
        id:
          type: string
        connectorInstanceId:
          type: string
        connectorDefinitionId:
          type: string
        userId:
          type: string
        name:
          type: string
        config:
          type: object
        status:
          type: string
          enum: [draft, active, deprecated, inactive]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ConnectorListResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/ConnectorDefinition"

    InstanceListResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/ConnectorInstance"

    UpdateInstanceConfigRequest:
      type: object
      properties:
        config:
          type: object

    # ---- System ----
    ModuleHealth:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        message:
          type: string

    HealthResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [status, timestamp]
              properties:
                status:
                  type: string
                  enum: [healthy, degraded]
                timestamp:
                  type: string
                  format: date-time
                modules:
                  type: object
                  additionalProperties:
                    $ref: "#/components/schemas/ModuleHealth"

    ReadyResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [status, timestamp]
              properties:
                status:
                  type: string
                timestamp:
                  type: string
                  format: date-time
                checks:
                  type: object

    RunInfo:
      type: object
      required: [runId, status, createdAt]
      properties:
        runId:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled]
        objective:
          type: string
        progress:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RunsResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                runs:
                  type: array
                  items:
                    $ref: "#/components/schemas/RunInfo"
                total:
                  type: integer

    UsageSummary:
      type: object
      required: [sessionId, messageCount, turnCount, estimatedInputTokens, estimatedOutputTokens, estimatedTotalTokens, updatedAt]
      properties:
        sessionId:
          type: string
        messageCount:
          type: integer
        turnCount:
          type: integer
        toolCallCount:
          type: integer
        approvalCount:
          type: integer
        artifactCount:
          type: integer
        runCount:
          type: integer
        estimatedInputTokens:
          type: integer
        estimatedOutputTokens:
          type: integer
        estimatedTotalTokens:
          type: integer
        estimatedCostCents:
          type: number
          nullable: true
        updatedAt:
          type: string
          format: date-time

    UsageSummaryResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/UsageSummary"

    UsageListResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PaginatedResponse"

    LogEntry:
      type: object
      required: [eventId, eventType, sourceModule, severity, summary, createdAt]
      properties:
        eventId:
          type: string
        eventType:
          type: string
        sourceModule:
          type: string
        sessionId:
          type: string
        severity:
          type: string
          enum: [info, warn, error]
        summary:
          type: string
        createdAt:
          type: string
          format: date-time
        payloadPreview:
          type: string

    LogListResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PaginatedResponse"

    SettingsConfig:
      type: object
      required: [localOnly, providers, retentionDays]
      properties:
        localOnly:
          type: boolean
        providers:
          type: object
          additionalProperties:
            type: object
            properties:
              configured:
                type: boolean
        retentionDays:
          type: integer

    SettingsResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [settings]
              properties:
                settings:
                  $ref: "#/components/schemas/SettingsConfig"

    InstanceSummary:
      type: object
      required: [type, status, apiPort, storeStatus]
      properties:
        type:
          type: string
        status:
          type: string
          enum: [healthy, degraded]
        uptime:
          type: number
        apiPort:
          type: integer
        storeStatus:
          type: string

    InstancesResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                instances:
                  type: array
                  items:
                    $ref: "#/components/schemas/InstanceSummary"

    ChannelSummary:
      type: object
      properties:
        connectorId:
          type: string
        type:
          type: string
        status:
          type: string
        configured:
          type: boolean

    ChannelsResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                channels:
                  type: array
                  items:
                    $ref: "#/components/schemas/ChannelSummary"

    SkillSummary:
      type: object
      required: [skillId, name, type, enabled]
      properties:
        skillId:
          type: string
        name:
          type: string
        type:
          type: string
        enabled:
          type: boolean

    SkillsResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                skills:
                  type: array
                  items:
                    $ref: "#/components/schemas/SkillSummary"

    PlannerRunEventsResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                events:
                  type: array
                  items:
                    type: object

    PlannerRunSummaryResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                status:
                  type: string
                stepCount:
                  type: integer
                currentStep:
                  type: string
                planVersion:
                  type: integer

    DebugReplayResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                eventCount:
                  type: integer
                transcriptCount:
                  type: integer
                runRefs:
                  type: array
                  items:
                    type: string
                approvalRefs:
                  type: array
                  items:
                    type: string
                lastEventId:
                  type: string
                redactedPreviews:
                  type: array
                  items:
                    type: object

    # ---- Shared ----
    PaginatedResponse:
      type: object
      required: [items, total, limit, offset, hasMore]
      properties:
        items:
          type: array
          items:
            type: object
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

  # ---- Standard Responses ----
  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            error:
              code: "BAD_REQUEST"
              message: "Invalid request body"
            requestId: "abc12345"

    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            error:
              code: "UNAUTHORIZED"
              message: "Authentication required"
            requestId: "abc12345"

    Forbidden:
      description: Access denied
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            error:
              code: "FORBIDDEN"
              message: "Access denied"
            requestId: "abc12345"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            error:
              code: "NOT_FOUND"
              message: "Resource not found"
            requestId: "abc12345"

    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            error:
              code: "CONFLICT"
              message: "Resource already exists"
            requestId: "abc12345"

    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            ok: false
            error:
              code: "INTERNAL_ERROR"
              message: "An unexpected error occurred"
            requestId: "abc12345"
