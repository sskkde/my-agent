openapi: "3.0.3"
info:
  title: Agent Platform API
  description: |
    Agent Platform Product Experience API - A multi-agent platform for task orchestration 
    and execution with LLM providers, background task processing, workflows, triggers, and connectors.
    
    All endpoints use a standard API response envelope:
    - Success: `{ ok: true, data: ..., requestId: "..." }`
    - Error: `{ ok: false, error: { code: "...", message: "..." }, requestId: "..." }`
  version: "v0.5.0"
  contact:
    name: Agent Platform Team

servers:
  - url: http://localhost:3003
    description: Development
  - url: http://localhost:3103
    description: E2E Testing

tags:
  - name: Auth & Setup
    description: Authentication and initial setup endpoints
  - name: Sessions
    description: Session management and messaging
  - name: Agents & Providers
    description: Agent configuration and LLM provider management
  - name: Workflows
    description: Workflow definition and execution
  - name: Triggers
    description: Schedule and webhook triggers
  - name: Approvals
    description: Approval request management
  - name: Memory
    description: Long-term memory management
  - name: Observability
    description: Run execution visibility, console views, and replay previews
  - name: Connectors
    description: Connector definition and instance management
  - name: System
    description: Health, status, usage, logs, and system configuration

paths:
  # ==========================================================================
  # Auth & Setup
  # ==========================================================================
  /api/setup/status:
    get:
      tags: [Auth & Setup]
      summary: Get setup status
      description: Returns whether initial setup is required
      operationId: getSetupStatus
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatusResponse"

  /api/setup/user:
    post:
      tags: [Auth & Setup]
      summary: Create initial user
      description: Creates the first user and logs them in (only allowed when no users exist)
      operationId: createInitialUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created and logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/auth/login:
    post:
      tags: [Auth & Setup]
      summary: Login
      description: Authenticate with username and password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/logout:
    post:
      tags: [Auth & Setup]
      summary: Logout
      description: End the current session
      operationId: logout
      security:
        - cookieSession: []
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api/auth/me:
    get:
      tags: [Auth & Setup]
      summary: Get current user
      description: Returns the currently authenticated user
      operationId: getCurrentUser
      security:
        - cookieSession: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ==========================================================================
  # Sessions
  # ==========================================================================
  /api/sessions:
    get:
      tags: [Sessions]
      summary: List sessions
      description: Returns paginated list of sessions for the current user
      operationId: listSessions
      security:
        - cookieSession: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived, closed]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Sessions]
      summary: Create session
      description: Creates a new session
      operationId: createSession
      security:
        - cookieSession: []
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"

  /api/sessions/{sessionId}:
    get:
      tags: [Sessions]
      summary: Get session
      description: Returns session details
      operationId: getSession
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/sessionId"
      responses:
        "200":
          description: Session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Sessions]
      summary: Update session
      description: Updates session title or status
      operationId: updateSession
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/sessionId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchSessionRequest"
      responses:
        "200":
          description: Session updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/sessions/{sessionId}/messages:
    post:
      tags: [Sessions]
      summary: Send message
      description: Sends a message to the session (processed asynchronously)
      operationId: sendMessage
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/sessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "202":
          description: Message accepted for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/sessions/{sessionId}/transcripts:
    get:
      tags: [Sessions]
      summary: Get transcripts
      description: Returns all transcripts for a session
      operationId: getTranscripts
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/sessionId"
      responses:
        "200":
          description: Session transcripts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscriptsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/sessions/{sessionId}/resume:
    post:
      tags: [Sessions]
      summary: Resume session
      description: Resumes a session and returns recent timeline
      operationId: resumeSession
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/sessionId"
      responses:
        "200":
          description: Session resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResumeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/sessions/{sessionId}/timeline:
    get:
      tags: [Sessions]
      summary: Get timeline
      description: Returns paginated timeline events for a session
      operationId: getTimeline
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/sessionId"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: eventTypes
          in: query
          schema:
            type: string
          description: Comma-separated list of event types to filter
      responses:
        "200":
          description: Timeline events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimelineResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/sessions/{sessionId}/timeline/stream:
    get:
      tags: [Sessions]
      summary: Stream timeline (SSE)
      description: Server-Sent Events endpoint for real-time timeline updates
      operationId: streamTimeline
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/sessionId"
        - name: after
          in: query
          schema:
            type: string
          description: Event ID to resume from
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /api/sessions/{sessionId}/model:
    patch:
      tags: [Sessions]
      summary: Set session model
      description: Sets the model and provider for a session
      operationId: setSessionModel
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/sessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetModelRequest"
      responses:
        "200":
          description: Model set successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/sessions/{sessionId}/usage:
    get:
      tags: [Sessions]
      summary: Get session usage
      description: Returns usage statistics for a session
      operationId: getSessionUsage
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/sessionId"
      responses:
        "200":
          description: Usage summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageSummaryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ==========================================================================
  # Agents & Providers
  # ==========================================================================
  /api/agents/{agentId}/config:
    get:
      tags: [Agents & Providers]
      summary: Get agent config
      description: Returns global, user override, and effective config for an agent
      operationId: getAgentConfig
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/agentId"
      responses:
        "200":
          description: Agent configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfigResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/agents/{agentId}/config/global:
    patch:
      tags: [Agents & Providers]
      summary: Update global agent config
      description: Updates the global default configuration (admin only)
      operationId: updateGlobalAgentConfig
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/agentId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentConfigRequest"
      responses:
        "200":
          description: Config updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/agents/{agentId}/config/override:
    patch:
      tags: [Agents & Providers]
      summary: Update user override config
      description: Updates the user-specific override configuration
      operationId: updateUserOverrideConfig
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/agentId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOverrideConfigRequest"
      responses:
        "200":
          description: Override updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags: [Agents & Providers]
      summary: Delete user override config
      description: Resets user override to global defaults
      operationId: deleteUserOverrideConfig
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/agentId"
      responses:
        "204":
          description: Override deleted
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/providers:
    get:
      tags: [Agents & Providers]
      summary: List providers
      description: Returns all configured providers for the current user
      operationId: listProviders
      security:
        - cookieSession: []
      responses:
        "200":
          description: List of providers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Agents & Providers]
      summary: Create provider
      description: Creates a new provider configuration
      operationId: createProvider
      security:
        - cookieSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderRequest"
      responses:
        "201":
          description: Provider created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/providers/{providerId}:
    patch:
      tags: [Agents & Providers]
      summary: Update provider
      description: Updates a provider configuration
      operationId: updateProvider
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/providerId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProviderRequest"
      responses:
        "200":
          description: Provider updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Agents & Providers]
      summary: Delete provider
      description: Deletes a provider configuration
      operationId: deleteProvider
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/providerId"
      responses:
        "204":
          description: Provider deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/providers/{providerId}/test:
    post:
      tags: [Agents & Providers]
      summary: Test provider connection
      description: Tests the provider connection
      operationId: testProvider
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/providerId"
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestProviderResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/models:
    get:
      tags: [Agents & Providers]
      summary: List models and providers
      description: Returns available providers and optionally session's selected model
      operationId: listModels
      security:
        - cookieSession: []
      parameters:
        - name: sessionId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Models and providers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/tools:
    get:
      tags: [Agents & Providers]
      summary: List tools
      description: Returns available tool catalog
      operationId: listTools
      responses:
        "200":
          description: Tool catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolsResponse"

  /api/tool-results/{resultId}:
    get:
      tags: [Agents & Providers]
      summary: Get tool result
      description: Returns a stored tool result by ID
      operationId: getToolResult
      security:
        - cookieSession: []
      parameters:
        - name: resultId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tool result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResultResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ==========================================================================
  # Workflows
  # ==========================================================================
  /api/workflows/drafts:
    get:
      tags: [Workflows]
      summary: List workflow drafts
      description: Returns all workflow drafts for the current user
      operationId: listWorkflowDrafts
      security:
        - cookieSession: []
      responses:
        "200":
          description: List of drafts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Workflows]
      summary: Create workflow draft
      description: Creates a new workflow draft
      operationId: createWorkflowDraft
      security:
        - cookieSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDraftRequest"
      responses:
        "201":
          description: Draft created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/workflows/drafts/{draftId}:
    get:
      tags: [Workflows]
      summary: Get workflow draft
      description: Returns a specific workflow draft
      operationId: getWorkflowDraft
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/draftId"
      responses:
        "200":
          description: Draft details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Workflows]
      summary: Update workflow draft
      description: Updates a workflow draft
      operationId: updateWorkflowDraft
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/draftId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDraftRequest"
      responses:
        "200":
          description: Draft updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Workflows]
      summary: Delete workflow draft
      description: Deletes a workflow draft
      operationId: deleteWorkflowDraft
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/draftId"
      responses:
        "204":
          description: Draft deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/workflows/drafts/{draftId}/validate:
    post:
      tags: [Workflows]
      summary: Validate workflow draft
      description: Validates a workflow draft and returns issues
      operationId: validateWorkflowDraft
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/draftId"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/workflows/drafts/{draftId}/publish:
    post:
      tags: [Workflows]
      summary: Publish workflow draft
      description: Publishes a draft as a workflow definition
      operationId: publishWorkflowDraft
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/draftId"
      responses:
        "201":
          description: Workflow published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefinitionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/workflows/definitions:
    get:
      tags: [Workflows]
      summary: List workflow definitions
      description: Returns all published workflow definitions
      operationId: listWorkflowDefinitions
      security:
        - cookieSession: []
      responses:
        "200":
          description: List of definitions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefinitionListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/workflows/definitions/{workflowId}:
    get:
      tags: [Workflows]
      summary: Get workflow definition
      description: Returns a specific workflow definition
      operationId: getWorkflowDefinition
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/workflowId"
      responses:
        "200":
          description: Definition details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DefinitionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/workflows/runs:
    get:
      tags: [Workflows]
      summary: List workflow runs
      description: Returns all workflow runs for the current user
      operationId: listWorkflowRuns
      security:
        - cookieSession: []
      responses:
        "200":
          description: List of runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRunListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Workflows]
      summary: Start workflow run
      description: Starts a new workflow run from a definition
      operationId: startWorkflowRun
      security:
        - cookieSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartRunRequest"
      responses:
        "201":
          description: Run started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/workflows/runs/{workflowRunId}:
    get:
      tags: [Workflows]
      summary: Get workflow run
      description: Returns details of a specific workflow run
      operationId: getWorkflowRun
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/workflowRunId"
      responses:
        "200":
          description: Run details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ==========================================================================
  # Triggers
  # ==========================================================================
  /api/triggers/schedules:
    get:
      tags: [Triggers]
      summary: List schedule triggers
      description: Returns all schedule triggers for the current user
      operationId: listScheduleTriggers
      security:
        - cookieSession: []
      responses:
        "200":
          description: List of schedules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Triggers]
      summary: Create schedule trigger
      description: Creates a new schedule trigger
      operationId: createScheduleTrigger
      security:
        - cookieSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleRequest"
      responses:
        "201":
