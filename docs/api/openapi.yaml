# ============================================================================
# Component Schemas
# ============================================================================
components:
  securitySchemes:
    cookieSession:
      type: apiKey
      in: cookie
      name: agent-platform-session
      description: Session cookie set after login

  parameters:
    sessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
      description: Session ID
    agentId:
      name: agentId
      in: path
      required: true
      schema:
        type: string
      description: Agent ID
    providerId:
      name: providerId
      in: path
      required: true
      schema:
        type: string
      description: Provider ID
    approvalId:
      name: approvalId
      in: path
      required: true
      schema:
        type: string
      description: Approval ID
    memoryId:
      name: memoryId
      in: path
      required: true
      schema:
        type: string
      description: Memory ID
    draftId:
      name: draftId
      in: path
      required: true
      schema:
        type: string
      description: Workflow draft ID
    workflowId:
      name: workflowId
      in: path
      required: true
      schema:
        type: string
      description: Workflow definition ID
    workflowRunId:
      name: workflowRunId
      in: path
      required: true
      schema:
        type: string
      description: Workflow run ID
    scheduleId:
      name: scheduleId
      in: path
      required: true
      schema:
        type: string
      description: Schedule trigger ID
    webhookId:
      name: webhookId
      in: path
      required: true
      schema:
        type: string
      description: Webhook trigger ID
    runId:
      name: runId
      in: path
      required: true
      schema:
        type: string
      description: Run ID
    plannerRunId:
      name: plannerRunId
      in: path
      required: true
      schema:
        type: string
      description: Planner run ID

  schemas:
    # ---- Envelope ----
    ApiEnvelope:
      type: object
      required: [ok, requestId]
      properties:
        ok:
          type: boolean
          description: true for success, false for error
        requestId:
          type: string
          description: Traceable request identifier

    ApiErrorDetail:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error message
        details:
          description: Additional error details

    SuccessResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          required: [data]
          properties:
            data:
              type: object

    ErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          required: [error]
          properties:
            error:
              $ref: "#/components/schemas/ApiErrorDetail"

    # ---- Auth & Setup ----
    SetupStatusResponse:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
        - type: object
          required: [data]
          properties:
            data:
              type: object
              required: [needsSetup]
              properties:
                needsSetup:
                  type: boolean

    CreateUserRequest:
      type: object
      required: [username, password]
      properties:
